<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Matrix AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Cairo',sans-serif;color:#fff} 
.phone{width:390px;height:844px;background:#0D0D0D;border-radius:48px;border:1px solid #1a1a1a;overflow:hidden;display:flex;flex-direction:column} 
.wrap{padding:24px 20px 0;flex:1;overflow:auto} 
.header{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:25px} 
.header svg{width:58px;height:58px;filter:drop-shadow(0 0 15px #FFC300) drop-shadow(0 0 30px #8B5CF6)} 
.brand{font-family:'Outfit';font-size:42px;background:linear-gradient(135deg,#FFC300 0%,#FFB000 100%);-webkit-background-clip:text;color:transparent;font-weight:900;filter:drop-shadow(0 0 20px rgba(255,195,0,0.5))} 
.lang{display:grid;grid-template-columns:1fr 1fr;background:#1A1A1A;border-radius:28px;padding:5px;margin:28px auto;max-width:340px;border:1px solid #252525;position:relative;height:58px} 
.lang::after{content:'';position:absolute;left:50%;top:25%;height:50%;width:1px;background:#333}
.lang button{border:0;background:0;color:#777;height:48px;border-radius:22px;font-weight:700;font-size:17px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Cairo'} 
.lang .on{background:linear-gradient(135deg,#FFC300,#FFB000);color:#000;margin:5px} 
.input{position:relative;margin-top:22px} 
.input input{width:100%;height:58px;background:#1A1A1A;border:2px solid #8B5CF6;border-radius:18px;padding:0 16px;color:#888;font-size:17px;text-align:right;font-family:'Cairo'} 
h3{text-align:center;margin:30px 0 16px;font-size:21px;font-weight:700} 
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px} 
.btn{height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;gap:12px;font-weight:800;font-size:20px;border:2px solid #8B5CF6;background:#1A1A1A;color:#3B82F6;font-family:'Cairo'} 
.btn span{font-size:24px}
.btn.on{background:linear-gradient(135deg,#FFC300,#FFB000);color:#000;border-color:#FFC300} 
.big{width:100%;height:68px;margin-top:14px;background:linear-gradient(135deg,#FFC300,#FFB000);border:0;border-radius:18px;color:#000;font-size:23px;font-weight:900;display:flex;align-items:center;justify-content:center;gap:12px;font-family:'Cairo'} 
.trend-title{font-size:18px;margin:25px 0 12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px} 
.trend-title i{color:#FF6B00}
.trend{background:#1A1A1A;border:2px solid #8B5CF6;border-radius:16px;padding:12px;display:flex;gap:12px;align-items:center;position:relative} 
.trend img{width:65px;height:65px;border-radius:12px;object-fit:cover} 
.badge{background:#FFC300;color:#000;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:900;position:absolute;top:-10px;right:10px} 
.title{font-weight:800;margin:6px 0 4px;font-size:14px} 
.meta{color:#888;font-size:12px} 
nav{height:85px;border-top:1px solid #1F1F2A;display:flex;justify-content:space-around;align-items:center;background:#0D0D0D} 
nav a{color:#666;text-decoration:none;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:6px;font-weight:700} 
nav a.on{color:#FFC300} 
nav a i{font-size:24px}
.plus{width:58px;height:58px;background:#8B5CF6;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:28px;margin-top:-28px;box-shadow:0 0 25px rgba(139,92,246,0.8)}
</style>
</head>
<body>
<div class="phone">
  <div class="wrap">
    <div class="header">
      <svg viewBox="0 0 100 100">
        <defs>
          <linearGradient id="goldgrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFC300"/>
            <stop offset="100%" style="stop-color:#FFB000"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <polygon points="50,5 95,32.5 95,67.5 50,95 5,67.5 5,32.5" fill="none" stroke="url(#goldgrad)" stroke-width="5" filter="url(#glow)"/>
        <circle cx="50" cy="25" r="7" fill="url(#goldgrad)" filter="url(#glow)"/>
        <circle cx="85" cy="50" r="7" fill="url(#goldgrad)" filter="url(#glow)"/>
        <circle cx="50" cy="75" r="7" fill="url(#goldgrad)" filter="url(#glow)"/>
        <circle cx="15" cy="50" r="7" fill="url(#goldgrad)" filter="url(#glow)"/>
        <line x1="50" y1="25" x2="85" y2="50" stroke="url(#goldgrad)" stroke-width="4"/>
        <line x1="85" y1="50" x2="50" y2="75" stroke="url(#goldgrad)" stroke-width="4"/>
        <line x1="50" y1="75" x2="15" y2="50" stroke="url(#goldgrad)" stroke-width="4"/>
        <line x1="15" y1="50" x2="50" y2="25" stroke="url(#goldgrad)" stroke-width="4"/>
      </svg>
      <div class="brand">Matrix AI</div>
    </div>

    <div class="lang">
      <button>🇨🇿 Čeština</button>
      <button class="on">عربي 🇹🇳</button>
    </div>

    <div class="input">
      <input placeholder="شنوة الحكاية اللي تحب تعملها اليوم؟" readonly>
    </div>

    <h3>الستايل</h3>
    <div class="grid">
      <button class="btn on"><span>🎭</span> دراما</button>
      <button class="btn"><span>⚡</span> تحفيزي</button>
      <button class="btn"><span>😀</span> مضحك</button>
      <button class="btn"><span>👻</span> رعب</button>
    </div>

    <h3>اختر الصوت</h3>
    <button class="big"><i class="fas fa-microphone"></i> ولّد الفيديو <i class="fas fa-wand-magic-sparkles"></i></button>

    <h3 class="trend-title"><i class="fas fa-fire"></i> ترند اليوم</h3>
    <div class="trend">
      <span class="badge">#1 ترند</span>
      <img src="https://i.imgur.com/8QfV45F.jpeg">
      <div>
        <div class="title">قصة خيال في تونس القديمة</div>
        <div class="meta">فيديو اليوم • 12 د • 1.2k</div>
      </div>
    </div>
  </div>
  <nav>
    <a class="on"><i class="fas fa-home"></i><span>الرئيسية</span></a>
    <a><i class="fas fa-search"></i><span>اكتشاف</span></a>
    <a><div class="plus"><i class="fas fa-plus"></i></div><span>إنشاء</span></a>
    <a><i class="fas fa-folder-open"></i><span>المكتبة</span></a>
    <a><i class="fas fa-user-circle"></i><span>حسابي</span></a>
  </nav>
</div>
</body>
</html>
